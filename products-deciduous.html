<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面山林：辦公室療癒系列 | Cat Gaze</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-main: #7F916A;    /* 鼠尾草綠 (你的主色) */
            --brand-accent: #B0C4B8;  /* 淺灰綠 */
            --brand-cream: #FDFAD9;   /* 奶油色 */
            --bg-light: #fcfcf8;      /* 背景色 */
            --text-dark: #4a4a4a;     /* 文字色 */
            --price-color: #d14900;   /* 價格色 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-light);
            margin: 0; color: var(--text-dark);
            line-height: 1.8;
        }

        .serif { font-family: 'Noto Serif TC', serif; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; }

        /* --- Header (完全統一) --- */
        header { background: white; border-bottom: 1px solid #eee; padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
        .navbar { display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 1.4rem; font-weight: 700; color: var(--brand-main); text-decoration: none; letter-spacing: 1px; }
        .nav-right a { margin-left: 20px; text-decoration: none; color: var(--text-dark); font-size: 0.9rem; }

        /* --- Hero Section (侘寂療癒風) --- */
        .office-hero {
            padding: 80px 0;
            text-align: center;
            background-color: var(--brand-cream);
            border-bottom: 1px solid #eee;
        }
        .office-hero h1 { font-size: 2.8rem; color: var(--brand-main); margin: 0; font-weight: 500; letter-spacing: 4px; }
        .office-hero p { font-size: 1.1rem; color: #777; margin-top: 15px; letter-spacing: 2px; }

        /* --- Product Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
            padding: 60px 0;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.4s ease;
            border: 1px solid #eee;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        .img-box { width: 100%; height: 320px; position: relative; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        .product-card:hover .img-box img { scale: 1.05; }

        /* 標籤：維持你的設計語彙 */
        .status-badge {
            position: absolute; top: 15px; left: 15px;
            background: var(--brand-main); color: white;
            padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
            font-weight: bold; letter-spacing: 1px;
        }

        .product-info { padding: 25px; }
        .product-info h3 { margin: 0; font-size: 1.4rem; color: var(--brand-main); font-weight: 600; }
        .healing-meta { font-size: 0.85rem; color: #888; margin: 10px 0; border-left: 2px solid var(--brand-accent); padding-left: 10px; }
        
        /* 巧遇店長的減壓碎碎念 (品牌專屬特色) */
        .qiaoyu-bubble {
            background: var(--brand-cream); padding: 15px; border-radius: 12px;
            font-size: 0.9rem; color: #666; margin: 20px 0;
            position: relative;
        }
        .qiaoyu-bubble::after {
            content: "🐈 店長悄悄話";
            display: block; font-weight: bold; color: var(--brand-main); margin-bottom: 5px;
        }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .price { font-size: 1.5rem; font-weight: 700; color: var(--price-color); }
        
        .btn-add {
            background: var(--brand-main); color: white; border: none;
            padding: 12px 25px; border-radius: 25px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-add:hover { background: #6a7a59; }

        @media (max-width: 768px) {
            .office-hero h1 { font-size: 2rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
.navbar a {
    display: flex;
    align-items: center;
    white-space: nowrap;
}

.logo-text {
    font-size: 1.4rem;
    font-weight: 700;

}

}

    display: flex; 
    justify-content: space-between; /* 關鍵：將空間分配在左右兩端 */
    align-items: center; 
    height: 60px;
}

.logo-container { 
    display: flex; 
    align-items: center; 
    text-decoration: none; 
    gap: 12px;
}

.site-logo { 
    height: 45px; 
    width: auto; 
    border-radius: 50%; 
}

.logo-text { 
    font-size: 1.4rem; 
    font-weight: 700; 
    color: var(--brand-main); 
    letter-spacing: 1px;
}

.nav-right {
    display: flex;
    align-items: center;
}

.nav-right a { 
    margin-left: 25px; /* 增加間距 */
    text-decoration: none; 
    color: var(--text-dark); 
    font-size: 0.95rem;
    font-weight: 500;
    transition: 0.3s;
    white-space: nowrap; /* 預防文字換行 */
}

.nav-right a:hover { 
    color: var(--brand-main); 
}

/* 手機版適配 */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column; /* 手機版改為上下排列 */
        height: auto;
        padding: 10px 0;
    }
    .nav-right {
        margin-top: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .nav-right a {
        margin: 5px 10px;
        font-size: 0.85rem;
    }
}
    </style>
</head>

        <nav class="nav-right">
